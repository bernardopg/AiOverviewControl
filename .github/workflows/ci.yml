name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CROWDIN_CLI_VERSION: "4.14.2"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Validate JSON metadata and translations
        run: |
          jq . plugin.json >/dev/null
          jq . i18n/en.json >/dev/null
          jq . i18n/pt_BR.json >/dev/null
          jq . i18n/zh_CN.json >/dev/null
          python - <<'PY'
          import json
          from pathlib import Path
          base = set(json.loads(Path('i18n/en.json').read_text()).keys())
          for locale in ('pt_BR', 'zh_CN'):
              keys = set(json.loads(Path(f'i18n/{locale}.json').read_text()).keys())
              missing = sorted(base - keys)
              extra = sorted(keys - base)
              if missing or extra:
                  raise SystemExit(f'{locale}: missing={missing} extra={extra}')
          PY

      - name: Validate shell helpers
        run: |
          bash -n get-provider-usage get-copilot-usage get-claude-usage
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck -S warning get-provider-usage get-copilot-usage get-claude-usage

      - name: Validate Crowdin config
        env:
          CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN || secrets.CROWLIN_API_TOKEN }}
        run: |
          python - <<'PY'
          from pathlib import Path
          config = Path('.github/crowdin.yml').read_text()
          required = [
              'project_id: "899362"',
              'base_path: ".."',
              'source: "/i18n/en.json"',
              'translation: "/i18n/%locale_with_underscore%.json"',
          ]
          missing = [item for item in required if item not in config]
          if missing:
              raise SystemExit(f'Crowdin config missing expected entries: {missing}')
          if not Path('i18n/en.json').is_file():
              raise SystemExit('Crowdin source file i18n/en.json is missing')
          PY

          if [ -z "${CROWDIN_API_TOKEN:-}" ]; then
            echo "Crowdin token is not available; skipping remote Crowdin CLI validation."
            exit 0
          fi

          curl -fsSL "https://github.com/crowdin/crowdin-cli/releases/download/${CROWDIN_CLI_VERSION}/crowdin-cli.zip" -o /tmp/crowdin-cli.zip
          unzip -q /tmp/crowdin-cli.zip -d /tmp/crowdin-cli
          python - <<'PY'
          import os
          from pathlib import Path
          Path('/tmp/crowdin-identity.yml').write_text('api_token: ' + os.environ['CROWDIN_API_TOKEN'] + '\n')
          PY
          java -jar "/tmp/crowdin-cli/${CROWDIN_CLI_VERSION}/crowdin-cli.jar" config lint --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml
          java -jar "/tmp/crowdin-cli/${CROWDIN_CLI_VERSION}/crowdin-cli.jar" config sources --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml
          java -jar "/tmp/crowdin-cli/${CROWDIN_CLI_VERSION}/crowdin-cli.jar" config translations --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml

      - name: Validate GitHub Actions workflows
        uses: raven-actions/actionlint@v2.1.2

      - name: QML lint (optional)
        run: |
          if command -v qmllint >/dev/null 2>&1; then
            qmllint AiOverviewControlWidget.qml AiOverviewControlSettings.qml AiOverviewControlI18n.qml
          else
            echo "qmllint not installed, skipping"
          fi
