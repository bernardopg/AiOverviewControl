name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CROWDIN_CLI_VERSION: "4.14.2"
  ACTIONLINT_VERSION: "1.7.12"

jobs:
  # ─── metadata ────────────────────────────────────────────────────────────────
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate plugin.json
        run: jq --exit-status . plugin.json >/dev/null

      - name: Validate i18n files
        run: |
          for f in i18n/en.json i18n/pt_BR.json i18n/zh_CN.json; do
            jq --exit-status . "$f" >/dev/null
          done
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          base = set(json.loads(Path('i18n/en.json').read_text()).keys())
          errors = []
          for locale in ('pt_BR', 'zh_CN'):
              keys = set(json.loads(Path(f'i18n/{locale}.json').read_text()).keys())
              missing = sorted(base - keys)
              extra   = sorted(keys - base)
              if missing:
                  errors.append(f'{locale}: missing keys: {missing}')
              if extra:
                  errors.append(f'{locale}: extra keys (not in en.json): {extra}')
          if errors:
              sys.exit('\n'.join(errors))
          PY

      - name: Validate plugin.json version format
        run: |
          VERSION="$(jq -r '.version' plugin.json)"
          echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || {
            echo "plugin.json version '$VERSION' is not semver" >&2
            exit 1
          }

  # ─── shell ───────────────────────────────────────────────────────────────────
  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Syntax check — all get-* scripts
        run: find providers -name 'get-*' -type f -print0 | xargs -0 bash -n

      - name: Install shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: shellcheck — main backends
        run: |
          shellcheck -S warning \
            providers/get-provider-usage \
            providers/get-copilot-usage \
            providers/get-claude-usage \
            providers/get-provider-wrapper

      - name: shellcheck — provider stubs
        run: |
          find providers -name 'get-*' \
            ! -name 'get-provider-usage' \
            ! -name 'get-copilot-usage' \
            ! -name 'get-claude-usage' \
            ! -name 'get-provider-wrapper' \
            -type f -print0 \
            | xargs -0 shellcheck -S warning

      - name: Confirm all stubs are executable
        run: |
          find providers -name 'get-*' -type f | while IFS= read -r f; do
            test -x "$f" || { echo "Not executable: $f" >&2; exit 1; }
          done

  # ─── qml ─────────────────────────────────────────────────────────────────────
  qml:
    name: QML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: QML lint (optional — skip if qmllint not available)
        run: |
          if command -v qmllint >/dev/null 2>&1; then
            qmllint \
              AiOverviewControlWidget.qml \
              AiOverviewControlSettings.qml \
              AiOverviewControlI18n.qml
          else
            echo "qmllint not installed — skipping (install qt6-declarative-dev to enable)"
          fi

  # ─── actionlint ──────────────────────────────────────────────────────────────
  actionlint:
    name: Workflow lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install actionlint with checksum verification
        run: |
          TARBALL="/tmp/actionlint.tar.gz"
          EXPECTED="8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
          curl -fsSL \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" \
            -o "$TARBALL"
          echo "${EXPECTED}  ${TARBALL}" | sha256sum --check --strict
          tar -xzf "$TARBALL" -C /tmp actionlint

      - name: Run actionlint
        run: /tmp/actionlint -color

  # ─── crowdin ─────────────────────────────────────────────────────────────────
  crowdin:
    name: Crowdin config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate Crowdin config structure
        run: |
          python3 - <<'PY'
          from pathlib import Path
          config = Path('.github/crowdin.yml').read_text()
          required = [
              'project_id: "899362"',
              'base_path: ".."',
              'source: "/i18n/en.json"',
              'translation: "/i18n/%locale_with_underscore%.json"',
          ]
          missing = [item for item in required if item not in config]
          if missing:
              raise SystemExit(f'Crowdin config missing expected entries: {missing}')
          if not Path('i18n/en.json').is_file():
              raise SystemExit('Crowdin source file i18n/en.json is missing')
          PY

      - name: Validate with Crowdin CLI (requires secret)
        env:
          CROWDIN_API_TOKEN: ${{ secrets.CROWLIN_API_TOKEN }}
        run: |
          if [ -z "${CROWDIN_API_TOKEN:-}" ]; then
            echo "Crowdin token not available — skipping remote CLI validation."
            exit 0
          fi

          curl -fsSL \
            "https://github.com/crowdin/crowdin-cli/releases/download/${CROWDIN_CLI_VERSION}/crowdin-cli.zip" \
            -o /tmp/crowdin-cli.zip
          unzip -q /tmp/crowdin-cli.zip -d /tmp/crowdin-cli

          python3 - <<'PY'
          import os
          from pathlib import Path
          Path('/tmp/crowdin-identity.yml').write_text(
              'api_token: ' + os.environ['CROWDIN_API_TOKEN'] + '\n'
          )
          PY
          JAR="/tmp/crowdin-cli/${CROWDIN_CLI_VERSION}/crowdin-cli.jar"
          java -jar "$JAR" config lint         --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml
          java -jar "$JAR" config sources      --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml
          java -jar "$JAR" config translations --config .github/crowdin.yml --identity /tmp/crowdin-identity.yml
