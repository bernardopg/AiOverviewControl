name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Create release artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          ZIP=AiOverviewControl-${TAG}.zip
          TAR=AiOverviewControl-${TAG}.tar.gz
          git ls-files -z | xargs -0 tar --exclude-vcs -czf "$TAR"
          git ls-files | zip "$ZIP" -@
          ls -lh "$ZIP" "$TAR"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3.0.0
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            AiOverviewControl-${{ github.ref_name }}.zip
            AiOverviewControl-${{ github.ref_name }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
