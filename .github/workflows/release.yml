name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package_and_release:
    name: Package and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Validate tag matches plugin.json version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(jq -r '.version' plugin.json)"
          if [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::Tag ${TAG} does not match plugin.json version v${VERSION}" >&2
            exit 1
          fi
          {
            echo "TAG=${TAG}"
            echo "VERSION=${VERSION}"
            echo "DIST_NAME=AiOverviewControl-${TAG}"
          } >> "$GITHUB_ENV"

      - name: Validate CHANGELOG has entry for this version
        run: |
          VERSION="$(jq -r '.version' plugin.json)"
          if ! grep -qF "## ${VERSION}" CHANGELOG.md && ! grep -qF "## [${VERSION}]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version ${VERSION} — add one before tagging" >&2
            exit 1
          fi

      - name: Validate i18n completeness
        run: |
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          base = set(json.loads(Path('i18n/en.json').read_text()).keys())
          errors = []
          for locale in ('pt_BR', 'zh_CN', 'es_ES', 'de_DE'):
              keys = set(json.loads(Path(f'i18n/{locale}.json').read_text()).keys())
              missing = sorted(base - keys)
              if missing:
                  errors.append(f'::error::{locale}: missing i18n keys before release: {missing}')
          if errors:
              sys.exit('\n'.join(errors))
          PY

      - name: Confirm provider scripts are executable
        run: |
          FAIL=0
          while IFS= read -r -d '' f; do
            if [ ! -x "$f" ]; then
              echo "::error::Not executable: ${f}"
              FAIL=1
            fi
          done < <(find providers -name 'get-*' -type f -print0)
          exit "$FAIL"

      - name: Build release artifacts
        run: |
          mkdir -p dist
          git archive \
            --format=zip \
            --prefix="${DIST_NAME}/" \
            -o "dist/${DIST_NAME}.zip" \
            HEAD
          git archive \
            --format=tar \
            --prefix="${DIST_NAME}/" \
            HEAD | gzip -9 > "dist/${DIST_NAME}.tar.gz"
          cd dist
          sha256sum "${DIST_NAME}.zip" "${DIST_NAME}.tar.gz" > "${DIST_NAME}.sha256"

          {
            echo "## Release artifacts"
            echo ""
            echo "| File | Size |"
            echo "| ---- | ---- |"
            while IFS= read -r -d '' f; do
              size="$(du -sh "$f" | cut -f1)"
              echo "| $(basename "$f") | ${size} |"
            done < <(find . -maxdepth 1 -name "${DIST_NAME}.*" -type f -print0 | sort -z)
            echo ""
            echo "### SHA-256 checksums"
            echo '```'
            cat "${DIST_NAME}.sha256"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          name: ${{ env.TAG }}
          generate_release_notes: true
          files: |
            dist/${{ env.DIST_NAME }}.zip
            dist/${{ env.DIST_NAME }}.tar.gz
            dist/${{ env.DIST_NAME }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
