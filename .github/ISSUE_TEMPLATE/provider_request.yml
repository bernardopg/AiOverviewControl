name: Provider request
description: Request support or fixes for an AI provider.
title: "[Provider]: "
labels:
  - provider
body:
  - type: input
    id: provider
    attributes:
      label: Provider name
      placeholder: "OpenRouter, Gemini, DeepSeek, ..."
    validations:
      required: true
  - type: textarea
    id: quota_source
    attributes:
      label: Usage or quota source
      description: Link official API docs or describe the local CLI/source that exposes usage data.
      placeholder: "Official endpoint, local CLI command, or account page."
    validations:
      required: true
  - type: textarea
    id: auth
    attributes:
      label: Authentication method
      description: Describe required env vars, local files, OAuth, or CLI login. Do not paste secrets.
    validations:
      required: true
  - type: textarea
    id: expected_fields
    attributes:
      label: Expected metrics
      description: Which values should the widget show?
      placeholder: "Used percent, reset time, remaining credits, token quota, ..."
    validations:
      required: true
